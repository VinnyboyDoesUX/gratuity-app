<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#141312">
<title>Gratuity</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gratuity">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,200..700,0..1,-50..200&display=swap">
</head>
<body>
  <div id="root"></div>

  <!-- Hidden input to summon system keyboard -->
  <input id="bill-input" type="tel" inputmode="decimal" autocomplete="off"
         style="position:fixed;opacity:0;pointer-events:none;top:0;left:0;width:1px;height:1px;">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/haptics.jsx"></script>
  <script type="text/babel" src="components/TickerNumber.jsx"></script>
  <script type="text/babel" src="components/BillHero.jsx"></script>
  <script type="text/babel" src="components/TierSelector.jsx"></script>
  <script type="text/babel" src="components/CustomTip.jsx"></script>
  <script type="text/babel" src="components/Summary.jsx"></script>
  <script type="text/babel" src="components/UnhingedFX.jsx"></script>
  <script type="text/babel" src="components/TweaksPanel.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>

  <script type="text/babel">
    (function tryRender(tries) {
      const App = window.App;
      if (!App) {
        if (tries < 40) return setTimeout(() => tryRender(tries + 1), 50);
        document.getElementById('root').innerHTML = '<pre style="color:#fff;padding:20px">App not defined after 2s</pre>';
        return;
      }
      try {
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      } catch (e) {
        document.getElementById('root').innerHTML = '<pre style="color:#fff;padding:20px;white-space:pre-wrap;font-size:11px">' + (e.stack || e.message) + '</pre>';
      }
    })(0);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
