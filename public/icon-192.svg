<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#141312"/>
  <!-- Subtle gold glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f2ca50" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#f2ca50" stop-opacity="0"/>
  </radialGradient>
  <rect width="192" height="192" rx="40" fill="url(#glow)"/>
  <!-- Gold G lettermark -->
  <text
    x="96"
    y="130"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-weight="400"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="-2"
  >G</text>
</svg>
